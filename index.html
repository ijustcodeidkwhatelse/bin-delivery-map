<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050810" />
  <title>BinRoute</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     MAP (full screen, behind everything)
═══════════════════════════════════════════ -->
<div id="map-perspective">
  <div id="map-tilt-wrapper">
    <div id="map"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     TOAST HOST
═══════════════════════════════════════════ -->
<div id="toast-host" class="overlay"></div>

<!-- ═══════════════════════════════════════════
     GEOCODING STATUS (tiny, corner)
═══════════════════════════════════════════ -->
<div id="geocode-status" class="hidden" style="
  position:fixed;bottom:70px;left:14px;z-index:300;
  background:rgba(8,12,22,0.88);border:1px solid rgba(255,255,255,0.15);
  border-radius:999px;padding:5px 14px;font-size:0.72rem;
  font-family:'JetBrains Mono',monospace;color:#64748b;
  backdrop-filter:blur(12px);pointer-events:none;
"></div>

<!-- ═══════════════════════════════════════════
     TOP OVERLAY — destination bar + search
═══════════════════════════════════════════ -->
<div id="top-bar" class="overlay">

  <!-- Destination card (hidden until stop activated) -->
  <div class="dest-card hidden-card" id="dest-card">
    <div class="dest-icon">📦</div>
    <div class="dest-info">
      <div class="dest-name" id="dest-name">No destination set</div>
      <div class="dest-sub" id="dest-addr">Tap a stop to navigate</div>
      <div class="dest-sub" id="dest-dist" style="color:var(--cyan);margin-top:2px;"></div>
    </div>
    <div class="dest-eta">
      <div class="dest-eta-time" id="dest-eta-time">--</div>
      <div class="dest-eta-label">arrive</div>
    </div>
  </div>

  <!-- Search bar -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      type="text"
      id="search-input"
      class="search-bar"
      placeholder="Search address or place…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="search-clear hidden" id="search-clear">✕</button>
    <div class="ac-dropdown hidden" id="search-ac"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════
     ARRIVING BANNER
═══════════════════════════════════════════ -->
<div id="arriving-banner" class="overlay">
  <div class="arriving-inner">
    <div class="arriving-icon">🏁</div>
    <div class="arriving-text">
      <div class="arriving-title">Arriving Now</div>
      <div class="arriving-sub" id="arriving-name">Stop</div>
    </div>
    <button class="btn btn-done btn-sm" onclick="markDone(window.S?.activeIdx)">✓ Done</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SPEED HUD
═══════════════════════════════════════════ -->
<div id="speed-hud" class="overlay">
  <div class="speed-hud-inner">
    <div class="speed-num" id="speed-num">0</div>
    <div class="speed-unit" id="speed-unit">km/h</div>
    <div class="speed-zone">
      Zone <span class="speed-zone-num" id="speed-zone-num">50</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     FAB COLUMN
═══════════════════════════════════════════ -->
<div id="fab-col" class="overlay">
  <button class="fab fab-primary active" id="fab-follow" title="Follow me">📍</button>
  <button class="fab" id="fab-tilt" title="Toggle 3D tilt">⛰</button>
  <button class="fab" id="fab-layers" title="Map style">🗺</button>
  <button class="fab" id="fab-fit" title="Fit all stops">⛶</button>
</div>

<!-- ═══════════════════════════════════════════
     MAP STYLE PICKER (slide up near FABs)
═══════════════════════════════════════════ -->
<div id="map-style-picker" class="overlay hidden">
  <div class="style-picker-inner" id="style-picker-inner">
    <!-- populated by JS from CONFIG.mapStyles -->
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SHEET BACKDROP
═══════════════════════════════════════════ -->
<div id="sheet-backdrop" style="
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:240;display:none;backdrop-filter:blur(3px);
"></div>
<script>
  document.getElementById("sheet-backdrop").addEventListener("click", () => {
    document.getElementById("stop-drawer").classList.remove("open");
    document.getElementById("stops-panel").classList.remove("open");
    document.getElementById("sheet-backdrop").style.display = "none";
  });
</script>

<!-- ═══════════════════════════════════════════
     STOP DETAIL DRAWER (slides from bottom / right)
═══════════════════════════════════════════ -->
<div id="stop-drawer" class="overlay" style="pointer-events:auto;z-index:310;">
  <div class="stop-drawer-inner">
    <div class="drawer-handle"><div class="drawer-handle-bar"></div></div>

    <div class="stop-drawer-header">
      <div class="stop-drawer-emoji" id="drawer-emoji">📦</div>
      <div class="stop-drawer-info">
        <div class="stop-drawer-name" id="drawer-name">Stop Name</div>
        <div class="stop-drawer-addr" id="drawer-addr">Address</div>
        <div class="stop-drawer-meta" id="drawer-meta"></div>
      </div>
    </div>

    <div class="stop-drawer-actions">
      <button class="btn btn-go btn-full" id="drawer-btn-go">
        ↗ Go to tip-off
      </button>
      <button class="btn btn-done" id="drawer-btn-done">✓ Mark done</button>
      <button class="btn btn-skip" id="drawer-btn-reopen" style="display:none">↩ Reopen</button>
      <button class="btn btn-ext" id="drawer-btn-nav">🗺 Open in Maps</button>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════
     STOPS PANEL (full route list)
═══════════════════════════════════════════ -->
<div id="stops-panel" class="overlay" style="pointer-events:auto;z-index:300;">
  <div class="stops-panel-inner">
    <div class="drawer-handle"><div class="drawer-handle-bar"></div></div>

    <div class="panel-header">
      <div class="panel-title-row">
        <div class="panel-title">All Stops</div>
        <button class="panel-close" id="panel-close">✕</button>
      </div>
      <div class="panel-progress">
        <div class="panel-progress-fill" id="panel-progress-fill" style="width:0%"></div>
      </div>
      <div class="panel-stats">
        <div class="panel-stat">
          <div class="panel-stat-num cyan" id="panel-stat-total">0</div>
          <div class="panel-stat-label">Total</div>
        </div>
        <div class="panel-stat">
          <div class="panel-stat-num green" id="panel-stat-done">0</div>
          <div class="panel-stat-label">Done</div>
        </div>
        <div class="panel-stat">
          <div class="panel-stat-num amber" id="panel-stat-pending">0</div>
          <div class="panel-stat-label">Left</div>
        </div>
      </div>
    </div>

    <div class="stops-list" id="stops-list">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     BOTTOM NAVIGATION BAR
═══════════════════════════════════════════ -->
<div id="bottom-bar" class="overlay" style="pointer-events:auto;z-index:200;">
  <button class="nav-btn" id="nav-map">
    <span class="nav-icon">🗺</span>Map
  </button>
  <button class="nav-btn" id="nav-stops">
    <span class="nav-icon">📦</span>Stops
  </button>
  <button class="nav-btn" id="nav-recenter">
    <span class="nav-icon">📍</span>Recenter
  </button>
  <button class="nav-btn" id="nav-route">
    <span class="nav-icon">⚡</span>Reroute
  </button>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="config.js"></script>
<script src="app.js"></script>

<!-- Fix sheet backdrop toggle for JS-driven open -->
<script>
  const _origOpen = HTMLElement.prototype.classList;
  ["stop-drawer","stops-panel"].forEach(id => {
    const el = document.getElementById(id);
    const obs = new MutationObserver(() => {
      const anyOpen = document.getElementById("stop-drawer").classList.contains("open")
                   || document.getElementById("stops-panel").classList.contains("open");
      document.getElementById("sheet-backdrop").style.display = anyOpen ? "block" : "none";
    });
    if (el) obs.observe(el, { attributes: true, attributeFilter: ["class"] });
  });
</script>

</body>
</html>
